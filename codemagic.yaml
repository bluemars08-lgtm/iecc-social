workflows:
  ios-testflight:
    name: IECC Social — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Name of the App Store Connect API key integration set in Codemagic.
      app_store_connect: Codemagic CI4
    environment:
      groups:
        - appstore            # must contain the secure var CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: "com.iecc.social"
      node: 20.18.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Expo prebuild (generate native iOS project)
        script: npx expo prebuild --platform ios --clean --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up code signing (creates distribution cert + profile via API key)
        script: |
          set -e
          keychain initialize
          # Use a STABLE private key (stored in Codemagic). The first build creates
          # one distribution certificate for this key; later builds reuse it.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key="$CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          # Only the main app project — not the pods' xcodeproj under node_modules
          xcode-project use-profiles --project "ios/*.xcodeproj"
      - name: Build IPA
        script: |
          set -e
          WS=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "Building workspace=$WS scheme=$SCHEME"
          xcode-project build-ipa --workspace "$WS" --scheme "$SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
