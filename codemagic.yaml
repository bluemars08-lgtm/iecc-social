workflows:
  ios-testflight:
    name: IECC Social — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Name of the App Store Connect API key integration set in Codemagic.
      app_store_connect: Codemagic CI4
    environment:
      vars:
        BUNDLE_ID: "com.iecc.social"
      node: 20.18.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Expo prebuild (generate native iOS project)
        script: npx expo prebuild --platform ios --clean --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up code signing (creates distribution cert + profile via API key)
        script: |
          set -e
          keychain initialize
          # Generate a NEW distribution certificate together with its private key
          # (so Codemagic owns the key). Skip if the account already has one we
          # can use. Then create/fetch the App Store provisioning profile.
          app-store-connect create-certificate --type IOS_DISTRIBUTION --save || true
          keychain add-certificates
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set -e
          WS=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "Building workspace=$WS scheme=$SCHEME"
          xcode-project build-ipa --workspace "$WS" --scheme "$SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
